name: CI - Churn API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qualidade:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar sintaxe Python
        run: |
          python -m compileall app tests scripts

  testes:
    runs-on: ubuntu-latest
    needs: qualidade
    env:
      HF_REPO_ID: VanessaMCorrea/churn-telecom-model
      HF_FILENAME: churn_pipeline.joblib
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes rápidos no pull request
        if: github.event_name == 'pull_request'
        run: |
          pytest tests/ -m "health" -v --tb=short

      - name: Rodar todos os testes no push
        if: github.event_name == 'push'
        run: |
          pytest tests/ -v --tb=short

  api_modelo:
    runs-on: ubuntu-latest
    needs: testes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      HF_REPO_ID: VanessaMCorrea/churn-telecom-model
      HF_FILENAME: churn_pipeline.joblib
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Iniciar API em background
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: Verificar healthcheck
        run: |
          curl --fail http://localhost:8000/health

      - name: Verificar documentação Swagger
        run: |
          curl --fail http://localhost:8000/docs